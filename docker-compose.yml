version: '3.9'

services:
  api:
    build:
      context: .
      target: builder
    ports:
      - "3000:3000"
      - "9229:9229"
    volumes:
      - ./src:/app/src
    env_file:
      - .env
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    command: npm run dev:debug

  mongodb:
    image: mongo:7
    ports:
      - "27018:27017"  # ← 27018 en Mac, 27017 dentro del contenedor
    environment:
      MONGO_INITDB_DATABASE: myapp
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --loglevel warning
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - app-network

volumes:
  mongo-data:
    driver: local
  redis-data:
    driver: local

networks:
  app-network:
    driver: bridge